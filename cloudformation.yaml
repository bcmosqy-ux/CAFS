AWSTemplateFormatVersion: "2010-09-09"
Description: CAFS Community Appointment and Feedback System

Parameters:
  Environment:
    Type: String
    Default: prod
  LambdaCodeBucket:
    Type: String

Resources:

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "cafs-lambda-role-"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CAFSAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::cafs-attachments--621533607634/*"
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref AppointmentNotificationTopic

  AppointmentsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "cafs-appointments-"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: appointmentId
          AttributeType: S
        - AttributeName: date
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: appointmentId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: DateIndex
          KeySchema:
            - AttributeName: date
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  FeedbackTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "cafs-feedback-"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: feedbackId
          AttributeType: S
        - AttributeName: category
          AttributeType: S
      KeySchema:
        - AttributeName: feedbackId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CategoryIndex
          KeySchema:
            - AttributeName: category
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  FeedbackAttachmentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "cafs-attachments--621533607634"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "cafs-frontend--621533607634"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AppointmentNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "cafs-notifications-"
      DisplayName: CAFS Notifications

  AppointmentsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "cafs-appointments-"
      Runtime: python3.12
      Handler: appointments_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: lambda/appointments_handler.zip
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          APPOINTMENTS_TABLE: !Ref AppointmentsTable
          SNS_TOPIC_ARN: !Ref AppointmentNotificationTopic

  FeedbackFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "cafs-feedback-"
      Runtime: python3.12
      Handler: feedback_handler.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: lambda/feedback_handler.zip
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          FEEDBACK_TABLE: !Ref FeedbackTable
          FEEDBACK_BUCKET: !Ref FeedbackAttachmentsBucket

  CAFSRestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "cafs-api-"
      EndpointConfiguration:
        Types: [REGIONAL]

  AppointmentsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CAFSRestApi
      ParentId: !GetAtt CAFSRestApi.RootResourceId
      PathPart: appointments

  AppointmentsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CAFSRestApi
      ResourceId: !Ref AppointmentsResource
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Join
          - ""
          - - "arn:aws:apigateway:"
            - !Ref AWS::Region
            - ":lambda:path/2015-03-31/functions/"
            - !GetAtt AppointmentsFunction.Arn
            - "/invocations"

  AppointmentIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CAFSRestApi
      ParentId: !Ref AppointmentsResource
      PathPart: "{id}"

  AppointmentIdMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CAFSRestApi
      ResourceId: !Ref AppointmentIdResource
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Join
          - ""
          - - "arn:aws:apigateway:"
            - !Ref AWS::Region
            - ":lambda:path/2015-03-31/functions/"
            - !GetAtt AppointmentsFunction.Arn
            - "/invocations"

  FeedbackResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CAFSRestApi
      ParentId: !GetAtt CAFSRestApi.RootResourceId
      PathPart: feedback

  FeedbackMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CAFSRestApi
      ResourceId: !Ref FeedbackResource
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Join
          - ""
          - - "arn:aws:apigateway:"
            - !Ref AWS::Region
            - ":lambda:path/2015-03-31/functions/"
            - !GetAtt FeedbackFunction.Arn
            - "/invocations"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - AppointmentsMethod
      - AppointmentIdMethod
      - FeedbackMethod
    Properties:
      RestApiId: !Ref CAFSRestApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref CAFSRestApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref Environment

  AppointmentsLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AppointmentsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Join
        - ""
        - - "arn:aws:execute-api:"
          - !Ref AWS::Region
          - ":"
          - !Ref AWS::AccountId
          - ":"
          - !Ref CAFSRestApi
          - "/*"

  FeedbackLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FeedbackFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Join
        - ""
        - - "arn:aws:execute-api:"
          - !Ref AWS::Region
          - ":"
          - !Ref AWS::AccountId
          - ":"
          - !Ref CAFSRestApi
          - "/*"

Outputs:
  ApiEndpoint:
    Description: API Gateway URL
    Value: !Join
      - ""
      - - "https://"
        - !Ref CAFSRestApi
        - ".execute-api."
        - !Ref AWS::Region
        - ".amazonaws.com/"
        - !Ref Environment
  FrontendBucketName:
    Value: !Ref FrontendBucket
  AppointmentsTableName:
    Value: !Ref AppointmentsTable
  FeedbackTableName:
    Value: !Ref FeedbackTable
